name: Control de Avance en Tiempo Real

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  evaluar-codigo:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código que el alumno acaba de subir
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Python en el servidor virtual
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instalar las dependencias necesarias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Ejecutar el script que evalúa los tests y actualiza Firebase
    - name: Ejecutar Evaluación y Reportar a Firebase
      env:
        FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        NOMBRE_RAMA: ${{ github.ref_name }}
      run: |
        python .github/scripts/evaluar_avance.py
